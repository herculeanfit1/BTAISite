name: Azure Static Web Apps Deployment

# =============================================================================
# COST-OPTIMIZED GITHUB ACTIONS WORKFLOW
# =============================================================================
# COST OPTIMIZATION STRATEGY:
# - Main branch pushes: Direct deployment only (local validation required)
# - Pull requests: Direct deployment only (local validation required)
# - Local CI/CD: Run ./ci/g_master.sh before pushing to main
# - GitHub Actions: DEPLOYMENT ONLY - no CI/CD pipeline
# - Oryx handles Next.js build and hybrid rendering setup
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

# Security: Minimal permissions
permissions:
  contents: read
  id-token: write  # For Azure OIDC
  pull-requests: read

# Limit concurrent runs to save costs
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =============================================================================
  # DIRECT DEPLOYMENT JOB (main branch pushes only)
  # =============================================================================
  deploy-main-to-azure:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
        env:
          NODE_VERSION: "20.19.1"

      # Deploying successfully is not the same as working. On 2026-07-22 a
      # deploy left every page healthy while /api/* returned the Next.js 404
      # page, because a Static Web Apps deployment can drop the linked-backend
      # routing to func-btai-site-prod. The ARM record still read
      # "provisioningState: Succeeded" throughout, so nothing in Azure looked
      # wrong. The contact form -- the site's only lead path -- was dead and
      # the deploy was green.
      #
      # This step exists so that failure is loud. It checks the API, not the
      # pages, because the pages were never the thing that broke.
      - name: Post-deployment verification
        run: |
          set -uo pipefail
          SITE="https://bridgingtrust.ai"
          ORIGIN="https://wonderful-bush-0e888f30f.6.azurestaticapps.net"

          echo "::group::Waiting for /api/health"
          ok=""
          for i in $(seq 1 12); do
            body="$(curl -sS --max-time 20 "$SITE/api/health" 2>/dev/null || true)"
            if printf '%s' "$body" | grep -q '"status"'; then
              echo "attempt $i: healthy -- $body"
              ok=1
              break
            fi
            echo "attempt $i: not ready yet"
            sleep 20
          done
          echo "::endgroup::"

          if [ -z "$ok" ]; then
            echo "::error::/api/* is not reachable four minutes after deploy."
            echo "Most likely cause: this deploy dropped the Static Web App's linked backend."
            echo "Origin check (distinguishes Cloudflare from the SWA itself):"
            curl -sS -o /dev/null -w '  %{http_code} from SWA origin\n' --max-time 20 "$ORIGIN/api/health" || true
            echo ""
            echo "Remediation -- re-link the backend, then re-run this job:"
            echo "  az staticwebapp backends unlink --name bridgingtrust-website --resource-group BTAI-RG1"
            echo "  az staticwebapp backends link --name bridgingtrust-website --resource-group BTAI-RG1 \\"
            echo "    --backend-resource-id /subscriptions/<sub>/resourceGroups/BTAI-RG1/providers/Microsoft.Web/sites/func-btai-site-prod \\"
            echo "    --backend-region eastus2"
            exit 1
          fi

          # Exercise the lead path itself. An intentionally invalid payload is
          # rejected by Zod before any email is sent or any CRM record is
          # written, so this proves the handler runs without creating a lead.
          echo "::group::Verifying /api/contact reaches its handler"
          probe="$(curl -sS -o /dev/null --max-time 25 -w '%{http_code} %{content_type}' \
              -X POST "$SITE/api/contact" \
              -H 'Content-Type: application/json' \
              -d '{"email":"not-an-email","message":""}' || echo 'curl-failed -')"
          status="${probe%% *}"
          ctype="${probe#* }"
          echo "status=$status content-type=$ctype"
          echo "::endgroup::"

          case "$status:$ctype" in
            400:application/json*)
              echo "Contact endpoint is live and validating." ;;
            *)
              echo "::error::POST /api/contact returned '$status $ctype'; expected a JSON 400."
              echo "An HTML response means the request fell through to the static site"
              echo "instead of reaching the Function App."
              exit 1 ;;
          esac

  # =============================================================================
  # FUNCTIONS BACKEND DEPLOYMENT (main branch only)
  # =============================================================================
  deploy-functions:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Functions app
        working-directory: api
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        working-directory: api
        run: |
          mkdir -p staging/dist
          cp dist/index.js staging/dist/
          cp dist/index.js.map staging/dist/ 2>/dev/null || true
          cp host.json staging/
          cp package.json staging/
          cp package-lock.json staging/
          cd staging && npm ci --omit=dev

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-btai-site-prod
          package: api/staging

  # =============================================================================
  # PR DEPLOYMENT JOB (deployment only)
  # =============================================================================
  deploy-pr-to-azure:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy PR to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
        env:
          NODE_VERSION: "20.19.1"

  # =============================================================================
  # CLEANUP JOB (for PRs)
  # =============================================================================
  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          action: "close"
          app_location: "/"

  # =============================================================================
  # FAILURE NOTIFICATION (main branch only)
  # =============================================================================
  # Production deploy failures were never suppressed -- deploy-functions has no
  # continue-on-error, and the runs on 2026-07-03, 07-06 and 07-07 are all
  # recorded as failures. The problem was that a failure only ever appeared on
  # the Actions tab, so all three sat unlooked-at for two weeks while no API
  # change could ship.
  #
  # This job gives a failed production deploy an owner. It reuses one open
  # issue rather than filing a new one per run, so a repeatedly broken deploy
  # is a single conversation instead of a pile of duplicates.
  notify-failure:
    if: >-
      always()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && (needs.deploy-main-to-azure.result == 'failure'
          || needs.deploy-functions.result == 'failure')
    needs: [deploy-main-to-azure, deploy-functions]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: Open or update the deploy-failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          SITE_RESULT: ${{ needs.deploy-main-to-azure.result }}
          FUNC_RESULT: ${{ needs.deploy-functions.result }}
        run: |
          set -uo pipefail

          # --repo is required on every gh call here: this job has no checkout
          # step, so there is no git remote for gh to infer the repository
          # from. Omitting it made `gh label create` fail silently, which then
          # made `gh issue create --label` fail with "'deploy-failure' not
          # found" and lost the notification entirely.
          gh label create deploy-failure --repo "$REPO" \
            --color B60205 \
            --description "A push to main failed to deploy" >/dev/null 2>&1 || true

          body="$(printf '%s\n' \
            "A production deploy from \`main\` failed." \
            "" \
            "| Job | Result |" \
            "|---|---|" \
            "| \`deploy-main-to-azure\` | \`${SITE_RESULT}\` |" \
            "| \`deploy-functions\` | \`${FUNC_RESULT}\` |" \
            "" \
            "- Commit: \`${SHA}\`" \
            "- Run: ${RUN_URL}" \
            "" \
            "If \`deploy-main-to-azure\` failed at *Post-deployment verification*, the site" \
            "deployed but \`/api/*\` did not come back -- the failing log prints the re-link" \
            "command. If it failed at *Re-link Function App backend*, check that the deploy" \
            "principal still holds its role on the Static Web App." \
            "" \
            "Close this issue once the deploy is green again.")"

          existing="$(gh issue list --repo "$REPO" --state open \
            --label deploy-failure --limit 1 --json number --jq '.[0].number // empty')"

          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
            echo "Commented on existing issue #${existing}"
          else
            # Fall back to an unlabelled issue rather than losing the alert.
            # The label is only there to make the next run find this issue and
            # comment instead of filing a duplicate; it is not worth dropping a
            # production-deploy failure over.
            gh issue create --repo "$REPO" \
              --title "Production deploy failing on main" \
              --label deploy-failure \
              --body "$body" \
            || gh issue create --repo "$REPO" \
              --title "Production deploy failing on main" \
              --body "$body"
          fi
