name: Azure Static Web Apps Deployment

# =============================================================================
# COST-OPTIMIZED GITHUB ACTIONS WORKFLOW
# =============================================================================
# COST OPTIMIZATION STRATEGY:
# - Main branch pushes: Direct deployment only (local validation required)
# - Pull requests: Direct deployment only (local validation required)
# - Local CI/CD: Run ./ci/g_master.sh before pushing to main
# - GitHub Actions: DEPLOYMENT ONLY - no CI/CD pipeline
# - Oryx handles Next.js build and hybrid rendering setup
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

# Security: Minimal permissions
permissions:
  contents: read
  id-token: write  # For Azure OIDC
  pull-requests: read

# Limit concurrent runs to save costs
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =============================================================================
  # DIRECT DEPLOYMENT JOB (main branch pushes only)
  # =============================================================================
  deploy-main-to-azure:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
        env:
          NODE_VERSION: "20.19.1"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # A Static Web Apps deployment regenerates the build's routing table from
      # the uploaded artifact. Bring-your-own-backend requires api_location to
      # be empty, so the regenerated table declares no API and the linked
      # backend stops routing -- verified on four consecutive deploys
      # 2026-07-22. The ARM record is untouched and keeps reading "Succeeded",
      # so nothing in Azure reveals the break. Re-applying the link is what
      # pushes the /api/* mapping back into the running build.
      #
      # SETTLE_SECONDS is the load-bearing part. Re-linking 28 seconds after a
      # deploy finished corrupted the routing so badly that the backend
      # captured "/" instead of "/api/*" and the entire site served the Azure
      # Functions placeholder page for 21 minutes. Re-links at 4, 6, 17 and 18
      # minutes were all clean. Do not lower this without new evidence.
      - name: Re-link Function App backend
        env:
          SWA_NAME: bridgingtrust-website
          SWA_RG: BTAI-RG1
          FUNC_NAME: func-btai-site-prod
          BACKEND_REGION: eastus2
          SETTLE_SECONDS: "300"
          SITE: "https://bridgingtrust.ai"
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -uo pipefail
          BASE="https://management.azure.com/subscriptions/${SUBSCRIPTION_ID}/resourceGroups/${SWA_RG}/providers/Microsoft.Web"
          BUILD_URL="${BASE}/staticSites/${SWA_NAME}/builds/default?api-version=2023-01-01"
          BACKEND_ID="${BASE}/sites/${FUNC_NAME}"

          echo "::group::Waiting for the build to be Ready and settled"
          settled=""
          for _ in $(seq 1 45); do
            json="$(az rest --method get --url "$BUILD_URL" -o json 2>/dev/null || echo '{}')"
            age="$(printf '%s' "$json" | python3 .github/scripts/swa_build_age.py 2>/dev/null || echo -1)"
            if [ "${age:--1}" -ge "$SETTLE_SECONDS" ] 2>/dev/null; then
              echo "build Ready and untouched for ${age}s"
              settled=1
              break
            fi
            echo "not settled yet (age=${age}s, need ${SETTLE_SECONDS}s)"
            sleep 20
          done
          echo "::endgroup::"

          if [ -z "$settled" ]; then
            echo "::error::Build never reported Ready+settled. Refusing to touch the backend."
            echo "Re-linking against an unsettled build is what caused the 2026-07-22 site outage."
            exit 1
          fi

          echo "::group::Re-linking"
          az staticwebapp backends unlink --name "$SWA_NAME" --resource-group "$SWA_RG" >/dev/null 2>&1 || true
          az staticwebapp backends link --name "$SWA_NAME" --resource-group "$SWA_RG" \
            --backend-resource-id "$BACKEND_ID" --backend-region "$BACKEND_REGION" >/dev/null || {
              echo "::error::az staticwebapp backends link failed."; exit 1; }
          echo "linked"
          echo "::endgroup::"

          # Verify BOTH that the API answers and that the site was not hijacked.
          # A corrupted link routes every path to the Function App, which is
          # far worse than the API being down, so it is checked every round and
          # rolled back immediately.
          echo "::group::Verifying site and API"
          ok=""
          for i in $(seq 1 30); do
            home="$(curl -sS --max-time 20 "$SITE/" 2>/dev/null || true)"
            api="$(curl -sS --max-time 20 "$SITE/api/health" 2>/dev/null || true)"
            case "$home" in
              *"Azure Function App is up and running"*)
                echo "::error::Backend hijacked the whole site. Rolling back."
                az staticwebapp backends unlink --name "$SWA_NAME" --resource-group "$SWA_RG" >/dev/null 2>&1 || true
                echo "Unlinked. The site will recover; /api/* stays down until a human re-links."
                exit 1 ;;
            esac
            case "$api" in
              *'"status"'*)
                case "$home" in
                  *"Bridging Trust AI"*) echo "attempt $i: site and API both healthy"; ok=1; break ;;
                esac ;;
            esac
            echo "attempt $i: not ready yet"
            sleep 20
          done
          echo "::endgroup::"

          if [ -z "$ok" ]; then
            echo "::error::Re-link did not restore /api/* within ten minutes."
            exit 1
          fi

      # Deploying successfully is not the same as working. On 2026-07-22 a
      # deploy left every page healthy while /api/* returned the Next.js 404
      # page, because a Static Web Apps deployment can drop the linked-backend
      # routing to func-btai-site-prod. The ARM record still read
      # "provisioningState: Succeeded" throughout, so nothing in Azure looked
      # wrong. The contact form -- the site's only lead path -- was dead and
      # the deploy was green.
      #
      # This step exists so that failure is loud. It checks the API, not the
      # pages, because the pages were never the thing that broke.
      - name: Post-deployment verification
        run: |
          set -uo pipefail
          SITE="https://bridgingtrust.ai"
          ORIGIN="https://wonderful-bush-0e888f30f.6.azurestaticapps.net"

          echo "::group::Waiting for /api/health"
          ok=""
          for i in $(seq 1 18); do
            body="$(curl -sS --max-time 20 "$SITE/api/health" 2>/dev/null || true)"
            if printf '%s' "$body" | grep -q '"status"'; then
              echo "attempt $i: healthy -- $body"
              ok=1
              break
            fi
            echo "attempt $i: not ready yet"
            sleep 20
          done
          echo "::endgroup::"

          if [ -z "$ok" ]; then
            echo "::error::/api/* is not reachable four minutes after deploy."
            echo "Most likely cause: this deploy dropped the Static Web App's linked backend."
            echo "Origin check (distinguishes Cloudflare from the SWA itself):"
            curl -sS -o /dev/null -w '  %{http_code} from SWA origin\n' --max-time 20 "$ORIGIN/api/health" || true
            echo ""
            echo "Remediation -- re-link the backend, then re-run this job:"
            echo "  az staticwebapp backends unlink --name bridgingtrust-website --resource-group BTAI-RG1"
            echo "  az staticwebapp backends link --name bridgingtrust-website --resource-group BTAI-RG1 \\"
            echo "    --backend-resource-id /subscriptions/<sub>/resourceGroups/BTAI-RG1/providers/Microsoft.Web/sites/func-btai-site-prod \\"
            echo "    --backend-region eastus2"
            exit 1
          fi

          # Exercise the lead path itself. An intentionally invalid payload is
          # rejected by Zod before any email is sent or any CRM record is
          # written, so this proves the handler runs without creating a lead.
          echo "::group::Verifying /api/contact reaches its handler"
          probe="$(curl -sS -o /dev/null --max-time 25 -w '%{http_code} %{content_type}' \
              -X POST "$SITE/api/contact" \
              -H 'Content-Type: application/json' \
              -d '{"email":"not-an-email","message":""}' || echo 'curl-failed -')"
          status="${probe%% *}"
          ctype="${probe#* }"
          echo "status=$status content-type=$ctype"
          echo "::endgroup::"

          case "$status:$ctype" in
            400:application/json*)
              echo "Contact endpoint is live and validating." ;;
            *)
              echo "::error::POST /api/contact returned '$status $ctype'; expected a JSON 400."
              echo "An HTML response means the request fell through to the static site"
              echo "instead of reaching the Function App."
              exit 1 ;;
          esac

  # =============================================================================
  # FUNCTIONS BACKEND DEPLOYMENT (main branch only)
  # =============================================================================
  deploy-functions:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Functions app
        working-directory: api
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        working-directory: api
        run: |
          mkdir -p staging/dist
          cp dist/index.js staging/dist/
          cp dist/index.js.map staging/dist/ 2>/dev/null || true
          cp host.json staging/
          cp package.json staging/
          cp package-lock.json staging/
          cd staging && npm ci --omit=dev

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-btai-site-prod
          package: api/staging

  # =============================================================================
  # PR DEPLOYMENT JOB (deployment only)
  # =============================================================================
  deploy-pr-to-azure:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy PR to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
        env:
          NODE_VERSION: "20.19.1"

  # =============================================================================
  # CLEANUP JOB (for PRs)
  # =============================================================================
  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          action: "close"
          app_location: "/"
