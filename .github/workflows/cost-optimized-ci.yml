name: Azure Static Web Apps Deployment

# =============================================================================
# COST-OPTIMIZED GITHUB ACTIONS WORKFLOW
# =============================================================================
# COST OPTIMIZATION STRATEGY:
# - Main branch pushes: Direct deployment only (local validation required)
# - Pull requests: Direct deployment only (local validation required)
# - Local CI/CD: Run ./ci/g_master.sh before pushing to main
# - GitHub Actions: DEPLOYMENT ONLY - no CI/CD pipeline
# - Oryx handles Next.js build and hybrid rendering setup
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

# Security: Minimal permissions
permissions:
  contents: read
  id-token: write  # For Azure OIDC
  pull-requests: read

# Limit concurrent runs to save costs
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =============================================================================
  # DIRECT DEPLOYMENT JOB (main branch pushes only)
  # =============================================================================
  deploy-main-to-azure:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
        env:
          NODE_VERSION: "20.19.1"

      - name: Post-deployment verification
        run: |
          echo "Deployment completed"
          echo "Site available at Azure Static Web Apps URL"

  # =============================================================================
  # FUNCTIONS BACKEND DEPLOYMENT (main branch only)
  # =============================================================================
  deploy-functions:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Functions app
        working-directory: api
        run: |
          npm ci
          npm run build

      - name: Prepare deployment package
        working-directory: api
        run: |
          mkdir -p staging
          cp dist/index.js staging/
          cp host.json staging/
          cp package.json staging/
          cd staging && npm ci --omit=dev

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-btai-site-prod
          package: api/staging

  # =============================================================================
  # PR DEPLOYMENT JOB (deployment only)
  # =============================================================================
  deploy-pr-to-azure:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Deploy PR to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: ""
        env:
          NODE_VERSION: "20.19.1"

  # =============================================================================
  # CLEANUP JOB (for PRs)
  # =============================================================================
  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          action: "close"
          app_location: "/"
