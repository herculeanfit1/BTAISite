name: Azure Static Web Apps Deployment

# =============================================================================
# COST-OPTIMIZED GITHUB ACTIONS WORKFLOW
# =============================================================================
# COST OPTIMIZATION STRATEGY:
# - Main branch pushes: Direct deployment only (local validation required)
# - Pull requests: Direct deployment only (local validation required)
# - Local CI/CD: Run ./ci/g_master.sh before pushing to main
# - GitHub Actions: DEPLOYMENT ONLY - no CI/CD pipeline
# =============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

# Security: Minimal permissions
permissions:
  contents: read
  id-token: write  # For Azure OIDC
  pull-requests: read

# Limit concurrent runs to save costs
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =============================================================================
  # DIRECT DEPLOYMENT JOB (main branch pushes only)
  # =============================================================================
  # Deploy directly to Azure - local validation assumed complete
  deploy-main-to-azure:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Fast deployment only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Setup Node.js (cached)
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --engine-strict=false

      - name: Build and prepare deployment
        run: |
          echo "🏗️ Building for Azure deployment..."
          rm -rf .next deploy_output
          npm run build
          # Assemble deployment directory: .next output + SSG HTML pages
          mkdir -p deploy_output
          cp -r .next/* deploy_output/
          # Copy SSG-rendered HTML pages to top-level paths
          for locale in en es fr; do
            for page in privacy terms; do
              src=".next/server/app/${locale}/${page}.html"
              if [ -f "$src" ]; then
                mkdir -p "deploy_output/${locale}/${page}"
                cp "$src" "deploy_output/${locale}/${page}/index.html"
                echo "  Copied ${src} -> deploy_output/${locale}/${page}/index.html"
              fi
            done
          done
          echo "✅ Build completed for deployment"

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "deploy_output"
          skip_app_build: true
        env:
          NODE_VERSION: "20.19.1"

      - name: Post-deployment verification
        run: |
          echo "✅ Deployment completed"
          echo "🌐 Site available at Azure Static Web Apps URL"

  # =============================================================================
  # PR DEPLOYMENT JOB (deployment only)
  # =============================================================================
  # Deploy PRs directly - local validation required
  deploy-pr-to-azure:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Strict timeout for deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - name: Setup Node.js (cached)
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --engine-strict=false

      - name: Build and prepare deployment
        run: |
          echo "🏗️ Building PR for Azure deployment..."
          rm -rf .next deploy_output
          npm run build
          # Assemble deployment directory: .next output + SSG HTML pages
          mkdir -p deploy_output
          cp -r .next/* deploy_output/
          # Copy SSG-rendered HTML pages to top-level paths
          for locale in en es fr; do
            for page in privacy terms; do
              src=".next/server/app/${locale}/${page}.html"
              if [ -f "$src" ]; then
                mkdir -p "deploy_output/${locale}/${page}"
                cp "$src" "deploy_output/${locale}/${page}/index.html"
                echo "  Copied ${src} -> deploy_output/${locale}/${page}/index.html"
              fi
            done
          done
          echo "✅ Build completed for PR deployment"

      - name: Deploy PR to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "deploy_output"
          skip_app_build: true
        env:
          NODE_VERSION: "20.19.1"

  # =============================================================================
  # CLEANUP JOB (for PRs)
  # =============================================================================
  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BRIDGINGTRUST_WEBSITE }}
          action: "close"
          app_location: "/"
